{% extends 'dashboard/base.html' %}

{% block content %}

<style>

.page-title{
    margin-bottom:40px;
}

.page-title h1{
    font-size:42px;
    margin-bottom:10px;
}

.page-title p{
    color:#6b7280;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.06);
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h2{
    margin-bottom:15px;
}

.card p{
    color:#6b7280;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:12px 20px;
    border-radius:12px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
    text-decoration:none;
    font-weight:600;
}

</style>

<div class="page-title">

    <h1>{{ faculty.name }}</h1>

    <p>
        Select a department to continue.
    </p>

</div>

<div class="grid">

    {% for d in departments %}

    <div class="card">

        <h2>{{ d.name }}</h2>

        <p>
            Explore programmes and digital courses
            available in this department.
        </p>

        <a
            href="{% url 'programme_list' d.slug %}"
            class="btn"
        >
            View Programmes
        </a>

    </div>

    {% endfor %}

</div>

{% endblock %}
