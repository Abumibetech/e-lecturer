{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout — E-Lecturer</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0f1a;
  --surface:   #111827;
  --surface2:  #1a2235;
  --border:    rgba(255,255,255,.07);
  --accent:    #00c2ff;
  --accent2:   #00f5d4;
  --text:      #f1f5fd;
  --muted:     #8b95b0;
  --font-head: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(130px);
  opacity: .12;
  pointer-events: none;
  z-index: 0;
  animation: drift 20s ease-in-out infinite alternate;
}
.blob-1 { width: 500px; height: 500px; background: #00c2ff; top: -150px; left: -100px; }
.blob-2 { width: 400px; height: 400px; background: #ef4444; bottom: -100px; right: -80px; animation-delay: -8s; }
.blob-3 { width: 300px; height: 300px; background: #00f5d4; top: 50%; left: 50%; animation-delay: -14s; }

@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(40px,60px) scale(1.1); }
}

.logout-card {
  position: relative;
  z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 52px 48px;
  text-align: center;
  max-width: 420px;
  width: 90%;
  animation: fadeUp .5s ease both;
  overflow: hidden;
}
.logout-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,194,255,.06), rgba(0,245,212,.03));
  pointer-events: none;
}
.logout-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  margin-bottom: 32px;
}
.logo img {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  object-fit: cover;
  box-shadow: 0 0 0 2px rgba(0,194,255,.3), 0 0 20px rgba(0,194,255,.2);
}
.logo-text {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.4px;
  background: linear-gradient(135deg, #fff 30%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.icon-circle {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: rgba(248,113,113,.1);
  border: 1px solid rgba(248,113,113,.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  animation: pulse 2.5s ease-in-out infinite;
}
.icon-circle svg { color: #f87171; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,.2); }
  50%       { box-shadow: 0 0 0 14px rgba(248,113,113,0); }
}

.logout-card h1 {
  font-family: var(--font-head);
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.5px;
  margin-bottom: 10px;
}
.logout-card p {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 32px;
}
.logout-card p span {
  color: var(--text);
  font-weight: 600;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin-bottom: 28px;
}

.btn-row {
  display: flex;
  gap: 12px;
  flex-direction: column;
}

/* ── LOGOUT BUTTON — now links to actual logout view ── */
.btn-logout {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: #fff;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .2s, transform .15s, box-shadow .2s;
  width: 100%;
}
.btn-logout:hover {
  opacity: .9;
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(239,68,68,.35);
}

.btn-cancel {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  text-decoration: none;
  transition: background .2s, color .2s, border-color .2s, transform .15s;
  width: 100%;
}
.btn-cancel:hover {
  background: rgba(255,255,255,.07);
  color: var(--text);
  border-color: rgba(255,255,255,.12);
  transform: translateY(-2px);
}

.footer-note {
  position: relative;
  z-index: 1;
  color: var(--muted);
  font-size: 13px;
  margin-top: 28px;
  animation: fadeUp .5s .15s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .logout-card { padding: 40px 24px; }
  .logout-card h1 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="logout-card">

    <a href="{% url 'dashboard' %}" class="logo">
        <img src="{% static 'images/e-lecturer.png' %}" alt="E-Lecturer">
        <span class="logo-text">E-Lecturer</span>
    </a>

    <div class="icon-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
    </div>

    <h1>Leaving so soon?</h1>
    <p>You're about to log out of your <span>E-Lecturer</span> account. Your progress is saved and you can always come back.</p>

    <div class="divider"></div>

    <div class="btn-row">

        <!-- FIX: points to logout view which logs out and redirects to home/login -->
        <a href="{% url 'logout' %}" class="btn-logout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Yes, Log Me Out
        </a>

        <a href="{% url 'dashboard' %}" class="btn-cancel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Back to Dashboard
        </a>

    </div>

</div>

<p class="footer-note">© 2026 E-Lecturer · All rights reserved</p>

</body>
</html>
